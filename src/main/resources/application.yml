server:
  port: 8080

spring:
  application:
    name: training-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/training_backend?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  # 至少 32 字节，生产环境请通过环境变量或配置中心注入，不要提交真实密钥。
  secret: "dev-only-change-me-please-keep-this-secret-at-least-32-bytes"
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
