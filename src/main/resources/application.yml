server:
  port: 8082

spring:
  application:
    name: training-backend
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/training_backend?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  # Local development only. Production must inject JWT_SECRET from environment or a secret manager.
  secret: "dev-only-change-me-please-keep-this-secret-at-least-32-bytes"
  expiration: 86400000

ai:
  qwen:
    # Set DASHSCOPE_API_KEY before running locally. Do not commit real API keys.
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    native-base-url: https://dashscope.aliyuncs.com/api/v1
    text-model: qwen-plus
    vision-model: qwen-vl-plus
    audio-model: qwen3-asr-flash
    ocr-model: qwen-vl-ocr-latest
    temperature: 0.4
    timeout-seconds: 60
    speech-max-base64-bytes: 10485760

file:
  upload-root: uploads
  public-base-url: /uploads

springdoc:
  swagger-ui:
    path: /swagger-ui.html
